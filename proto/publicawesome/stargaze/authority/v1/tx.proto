syntax = "proto3";
package publicawesome.stargaze.authority.v1;

import "gogoproto/gogo.proto";
import "cosmos/msg/v1/msg.proto";
import "google/protobuf/any.proto";

option go_package = "github.com/public-awesome/stargaze/v12/x/authority/types";


// Msg defines the authority Msg service.
service Msg {
    rpc SubmitProposal(MsgSubmitProposal)
        returns (MsgSubmitProposalResponse);
  }

// MsgSubmitProposal defines an sdk.Msg type that supports submitting arbitrary
// proposal Content.
message MsgSubmitProposal {
    option (cosmos.msg.v1.signer) = "proposer"; 
  
    repeated google.protobuf.Any messages = 1;
    string proposer = 2;
  }
  
  // MsgSubmitProposalResponse defines the Msg/SubmitProposal response type.
  message MsgSubmitProposalResponse {
    //uint64 proposal_id = 1 [(gogoproto.jsontag) = "proposal_id", (gogoproto.moretags) = "yaml:\"proposal_id\""];
  }